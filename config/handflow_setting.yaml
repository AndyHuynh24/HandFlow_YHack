- name: Coding
  set_marker_id: 14
  buttons:
    0:
      type: none
      value: ''
      label: CV Video Loop
      actions:
      - type: text
        value: "cap = cv2.VideoCapture(0)                                        \
          \                                                                      \
          \            \nwhile cap.isOpened():\n\tret, frame = cap.read()        \
          \                                                                      \
          \                                          \n\tif not ret:             \
          \                                                     \n\t\tbreak\n\tcv2.imshow('Frame',\
          \ frame)\n      \tif cv2.waitKey(1) & 0xFF == ord('q'):\n          \t\t\
          break\ncap.release()\ncv2.destroyAllWindows()"
        label: ''
        delay: 0.17
    1:
      type: none
      value: ''
      label: Draw OpenCV Rect
      actions:
      - type: text
        value: '<!-- Text & data -->

          <input type="text" />

          <input type="email" />

          <input type="password" />

          <input type="search" />

          <input type="url" />

          <input type="tel" />


          <!-- Numbers & ranges -->

          <input type="number" />

          <input type="range" />


          <!-- Date & time -->

          <input type="date" />

          <input type="time" />

          <input type="datetime-local" />

          <input type="month" />

          <input type="week" />


          <!-- Selection -->

          <input type="checkbox" />

          <input type="radio" />


          <!-- Files & media -->

          <input type="file" />

          <input type="image" />


          <!-- Buttons -->

          <input type="button" />

          <input type="submit" />

          <input type="reset" />


          <!-- UI / system -->

          <input type="color" />

          <input type="hidden" />

          '
        label: ''
        delay: 0.17
    2:
      type: none
      value: ''
      label: Draw OpenCV Text
      actions:
      - type: shortcut
        value: cmd+r
        label: Run
        delay: 0.17
    3:
      type: none
      value: ''
      label: Run Train
      actions:
      - type: shortcut
        value: cmd+shift+d
        label: Debug
        delay: 0.17
    4:
      type: none
      value: ''
      label: Git Commit All
      actions:
      - type: text
        value: 'git add . '
        label: ''
        delay: 0.2
      - type: shortcut
        value: return
        label: ''
        delay: 0.2
      - type: text
        value: git commit -m "update"
        label: ''
        delay: 0.17
    5:
      type: none
      value: ''
      label: Git push
      actions:
      - type: text
        value: git push -u origin master
        label: ''
        delay: 0.2
      - type: shortcut
        value: return
        label: ''
        delay: 0.17
    6:
      type: none
      value: ''
      label: Start debug
      actions:
      - type: shortcut
        value: F5
        label: ''
        delay: 0.17
    7:
      type: none
      value: ''
      label: Run dataset
      actions:
      - type: shortcut
        value: cmd+shift+g
        label: Git
        delay: 0.17
    8:
      type: none
      value: ''
      label: Draw rect
      actions:
      - type: text
        value: "cv2.rectangle(\n    img,\n    (x1, y1),  # top-left corner\n    (x2,\
          \ y2),  # bottom-right corner\n    (0, 255, 0),  # color (B, G, R)\n   \
          \ 2  # thickness (px)\n)"
        label: ''
        delay: 0.17
    9:
      type: none
      value: ''
      label: ''
      actions: []
    10:
      type: none
      value: ''
      label: ''
      actions: []
    11:
      type: none
      value: ''
      label: ''
      actions: []
active_macropad_set: 2
macropad_enabled: true
camera:
  index: 0
  flip_horizontal: true
  flip_vertical: true
  swap_hands: true
  source: webcam
  esp32_serial_port: /dev/cu.usbmodem101
  esp32_baud_rate: 2000000
mouse:
  smoothing: 0.27
  base_sensitivity: 1.0
  poll_interval: 0.002
  inner_deadzone: 0.005
  outer_deadzone: 0.014
  activation_threshold: 0.06
inference:
  confidence_threshold: 0.7
  stability_window: 6
  cooldown_frames: 12
  min_detection_confidence: 0.4
  min_tracking_confidence: 0.2
  model_complexity: 1
theme: darkq
window_geometry: 1000x700
screen_overlay_macropad_enabled: true
screen_overlay_macropad:
  name: Screen Overlay
  set_marker_id: 20
  buttons:
    0:
      type: none
      value: ''
      label: Close all windows
      actions:
      - type: text
        value: "cap = cv2.VideoCapture(0)\nwhile True:\n    ret, frame = cap.read()\n\
          \    if not ret:\n        break\n    cv2.imshow('frame', frame)\n    if\
          \ cv2.waitKey(1) & 0xFF == ord('q'):\n        break\ncap.release()\ncv2.destroyAllWindows()"
        label: ''
        delay: 0.17
    1:
      type: none
      value: ''
      label: Shortcut
      actions:
      - type: text
        value: "Uyen v\xE0 LInh l\xE0 con ch\xF3"
        label: ''
        delay: 0.17
    2:
