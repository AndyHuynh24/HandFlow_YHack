---
version: "2.0"
services:
  train:
    image: andyhuynh24/handflow-train:v7
    expose:
      - port: 80
        as: 80
        to:
          - global: true
    env:
      - GH_TOKEN=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
      - EPOCHS=1000
profiles:
  compute:
    train:
      resources:
        cpu:
          units: 4
        memory:
          size: 8Gi
        storage:
          - size: 20Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
  placement:
    dcloud:
      pricing:
        train:
          denom: uakt
          amount: 100000
deployment:
  train:
    dcloud:
      profile: train
      count: 1
